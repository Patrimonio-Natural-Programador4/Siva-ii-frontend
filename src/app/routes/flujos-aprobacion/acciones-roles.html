<page-header/>
<div class="row">
  <div class="col-sm-12">
    <mat-card class="roles-card">
      <mat-card-header>
        <mat-card-title>Roles de aprobación - {{ accion }}</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <mat-vertical-stepper orientation="vertical" [linear]="isLinear">
          <mat-step [stepControl]="fGeneral.control">
            <form novalidate #fGeneral="ngForm" class="roles-step-form">
              <ng-template matStepLabel>Información general</ng-template>

              <div class="roles-form-stack">
                <div class="mb-2">
                  <label for="nombre" class="form-label">Nombre del rol*</label>
                  <input
                    id="nombre"
                    type="text"
                    class="form-control"
                    placeholder="Nombre del rol"
                    required
                    [(ngModel)]="rolData.nombre"
                    name="nombre"
                    maxlength="255"
                    #nombre="ngModel"
                    [class.is-invalid]="nombre.invalid && (nombre.dirty || nombre.touched)"
                  />
                  @if (nombre.invalid && (nombre.dirty || nombre.touched)) {
                    <div class="invalid-feedback d-block">
                      <span class="text-danger">Este campo es requerido.</span>
                    </div>
                  }
                </div>

                <div class="mb-3">
                  <label for="descripcion" class="form-label">Descripción</label>
                  <textarea
                    id="descripcion"
                    class="form-control"
                    rows="3"
                    placeholder="Descripción del rol"
                    [(ngModel)]="rolData.descripcion"
                    name="descripcion"
                    maxlength="255"
                  ></textarea>
                </div>
              </div>

              <div class="roles-step-actions">
                <button mat-flat-button color="primary" type="button" matStepperNext [disabled]="!fGeneral.valid">
                  Continuar
                </button>
              </div>
            </form>
          </mat-step>

          <mat-step [stepControl]="fCount.control">
            <form novalidate #fCount="ngForm">
              <input type="hidden" required name="numeroUsuariosAsignados" [(ngModel)]="numeroUsuariosAsignados" />
            </form>

            <form novalidate #fUsuarios="ngForm" class="roles-step-form">
              <ng-template matStepLabel>Asociar usuarios</ng-template>

              <div class="roles-modulo-add">
                <div class="roles-modulo-add__field">
                  <label for="id_usuario" class="form-label">Usuario</label>
                  <select
                    id="id_usuario"
                    class="form-select"
                    required
                    [(ngModel)]="usuariosRol.id_usuario"
                    name="id_usuario"
                    #idUsuario="ngModel"
                    [class.is-invalid]="idUsuario.invalid && (idUsuario.dirty || idUsuario.touched)"
                  >
                    <option [ngValue]="null" disabled>Seleccione el usuario</option>
                    @for (usuario of listaUsuarios; track usuario.identity) {
                      <option [ngValue]="usuario.identity">{{ usuario.valor }}</option>
                    }
                  </select>
                </div>

                <button mat-flat-button color="primary" class="mt-4" type="button" (click)="asignarUsuario()" [disabled]="!fUsuarios.valid">
                  <mat-icon>add</mat-icon>
                  Asignar usuario
                </button>
              </div>

              <div class="app-data-table-wrapper">
                <table mat-table [dataSource]="rolData.usuarios || []" class="app-data-table mat-elevation-z1">
                  <ng-container matColumnDef="posicion">
                    <th mat-header-cell *matHeaderCellDef>No.</th>
                    <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
                  </ng-container>

                  <ng-container matColumnDef="usuario">
                    <th mat-header-cell *matHeaderCellDef>Usuario</th>
                    <td mat-cell *matCellDef="let element">{{ element.usuario }}</td>
                  </ng-container>

                  <ng-container matColumnDef="acciones">
                    <th mat-header-cell *matHeaderCellDef>Acciones</th>
                    <td mat-cell *matCellDef="let element">
                      <button mat-icon-button type="button" (click)="eliminarUsuario(element.id_usuario)">
                        <mat-icon class="mat-icon-danger">delete</mat-icon>
                      </button>
                    </td>
                  </ng-container>

                  <tr mat-header-row *matHeaderRowDef="columnas"></tr>
                  <tr mat-row *matRowDef="let row; columns: columnas"></tr>
                </table>
              </div>
            </form>
          </mat-step>
        </mat-vertical-stepper>
      </mat-card-content>

      <mat-card-actions align="end">
        <button mat-stroked-button type="button" (click)="volver()">Cancelar</button>
        <button mat-flat-button color="primary" type="button" (click)="guardarRol()" [disabled]="isLoading">
          @if (isLoading) {
            <mat-spinner diameter="18"></mat-spinner>
          } @else {
            Guardar
          }
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
